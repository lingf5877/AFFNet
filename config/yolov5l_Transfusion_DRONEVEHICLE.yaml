# parameters
nc: 5  # number of classes
depth_multiple: 1.00  # model depth multiple
width_multiple: 1.00  # layer channel multiple

# anchors
anchors:
  - [10,13, 16,30, 33,23]  # P3/8
  - [30,61, 62,45, 59,119]  # P4/16
  - [116,90, 156,198, 373,326]  # P5/32

# YOLOv5 backbone
backbone:
  # [from, number, module, args]
  # Two Stream
  [[-1, 1, Conv, [64, 6, 2, 2]],  # 0-P1/2
   [-1, 1, Conv, [128, 3, 2]],  # 1-P2/4
   [-1, 3, C3, [128]],
   [-1, 1, Conv, [256, 3, 2]],  # 3-P3/8
   [-1, 6, C3, [256]],
   [-1, 1, Conv, [512, 3, 2]],  # 5-P4/16
   [-1, 9, C3, [512]],
   [-1, 1, Conv, [1024, 3, 2]],  # 7-P5/32
   [-1, 3, C3, [1024]],
   [-1, 1, SPPF, [1024, 5]],  # 9 

   [-4, 1, Conv, [64, 6, 2, 2]],  # 10-P1/2  
   [-1, 1, Conv, [128, 3, 2]],  # 11-P2/4
   [-1, 3, C3, [128]],
   [-1, 1, Conv, [256, 3, 2]],  # 13-P3/8
   [-1, 6, C3, [256]],
   [-1, 1, Conv, [512, 3, 2]],  # 15-P4/16
   [-1, 9, C3, [512]],
   [-1, 1, Conv, [1024, 3, 2]],  # 17-P5/32
   [-1, 3, C3, [1024]],
   [-1, 1, SPPF, [1024, 5]],  # 19
   [[4,14], 1, FuseMap, []],  # 20

    ######### Fusion Block #############
   [[4,14,20], 1, TransformerFusionBlock, [256, 20, 20]],    # 21 two stream fuse
   [[6,16,20], 1, TransformerFusionBlock, [512, 16, 16]],    # 22 two stream fuse
   [[9,19,20], 1, TransformerFusionBlock, [1024, 10, 10]],    # 23 two stream fuse
  ]


# YOLOv5 head
head:
  [[-1, 1, Conv, [512, 1, 1]],          # 24
   [-1, 1, nn.Upsample, [None, 2, 'nearest']],  # 25
   [[-1,22], 1, Concat, [1]],           # 26 cat backbone P4
   [-1, 3, C3, [512, False]],           # 27

   [-1, 1, Conv, [256, 1, 1]],          # 28
   [-1, 1, nn.Upsample, [None, 2, 'nearest']],  # 29
   [[-1,21], 1, Concat, [1]],           # 30 cat backbone P3
   [-1, 3, C3, [256, False]],           # 31 (P3/8-small)

   [-1, 1, Conv, [256, 3, 2]],          # 32
   [[-1,28], 1, Concat, [1]],           # 33 cat head P4
   [-1, 3, C3, [512, False]],           # 34 (P4/16-medium)

   [-1, 1, Conv, [512, 3, 2]],          # 35
   [[-1,24], 1, Concat, [1]],           # 36 cat head P5
   [-1, 3, C3, [1024, False]],          # 37 (P5/32-large)

   [[31, 34, 37, 4,14,21, 6,16,22, 9,19,23], 1, Detect, [nc, anchors]],    
  ]

#[10,13, 16,30, 33,23]  # P3/8
#[30,61, 62,45, 59,119]  # P4/16
#[116,90, 156,198, 373,326]
